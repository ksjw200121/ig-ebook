<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>下載你的電子書｜我是金孫</title>
<meta property="og:title" content="IG 合規經營地雷指南｜我是金孫">
<meta property="og:description" content="付款完成！點此下載你的電子書。44頁・36組違規vs合規對照表・保險美業直銷微商適用">
<meta property="og:image" content="https://ksjw200121.github.io/ig-ebook/cover.jpg">
<meta property="og:url" content="https://ksjw200121.github.io/ig-ebook/download.html">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #111;
    --yellow: #FFD700;
    --red: #E8002D;
    --white: #F5F5F5;
    --gray: #888;
    --gray2: #222;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    text-align: center;
  }

  /* confetti burst on load */
  .burst {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .burst span {
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 2px;
    animation: fall 2.2s ease-out forwards;
    opacity: 0;
  }
  @keyframes fall {
    0%   { opacity: 1; transform: translateY(-20px) rotate(0deg); }
    100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
  }

  .card {
    position: relative;
    z-index: 1;
    max-width: 480px;
    width: 100%;
  }

  /* top accent */
  .top-bar {
    height: 5px;
    background: var(--yellow);
    border-radius: 2px 2px 0 0;
    margin-bottom: 0;
  }

  .card-inner {
    background: var(--gray2);
    border: 1px solid #2a2a2a;
    padding: 48px 36px 40px;
  }

  .check-icon {
    width: 72px;
    height: 72px;
    background: rgba(40,200,100,0.12);
    border: 2px solid #28c864;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 28px;
    animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
    opacity: 0;
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.4); }
    to   { opacity: 1; transform: scale(1); }
  }
  .check-icon svg {
    width: 36px; height: 36px;
    stroke: #28c864; stroke-width: 2.5;
    fill: none; stroke-linecap: round; stroke-linejoin: round;
  }

  h1 {
    font-size: 28px;
    font-weight: 900;
    margin-bottom: 10px;
    animation: fadeUp 0.5s ease forwards 0.2s;
    opacity: 0;
  }
  h1 em { font-style: normal; color: var(--yellow); }

  .sub {
    font-size: 15px;
    color: var(--gray);
    margin-bottom: 36px;
    animation: fadeUp 0.5s ease forwards 0.3s;
    opacity: 0;
  }

  /* book preview */
  .book-preview {
    background: #1a1a1a;
    border-left: 4px solid var(--yellow);
    padding: 16px 20px;
    text-align: left;
    margin-bottom: 28px;
    animation: fadeUp 0.5s ease forwards 0.4s;
    opacity: 0;
  }
  .book-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 6px;
  }
  .book-meta {
    font-size: 13px;
    color: var(--gray);
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }
  .book-meta span::before { content: '· '; }

  /* download button */
  .dl-btn {
    display: block;
    width: 100%;
    background: var(--yellow);
    color: #111;
    font-size: 18px;
    font-weight: 900;
    padding: 18px 24px;
    text-decoration: none;
    letter-spacing: 0.04em;
    transition: transform 0.15s, box-shadow 0.15s;
    animation: fadeUp 0.5s ease forwards 0.5s;
    opacity: 0;
    cursor: pointer;
    border: none;
    font-family: 'Noto Sans TC', sans-serif;
  }
  .dl-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(255,215,0,0.25);
  }
  .dl-btn:active { transform: translateY(0); }

  .dl-note {
    font-size: 12px;
    color: #555;
    margin-top: 14px;
    animation: fadeUp 0.5s ease forwards 0.6s;
    opacity: 0;
  }

  /* divider */
  .divider {
    height: 1px;
    background: #2a2a2a;
    margin: 32px 0;
    animation: fadeUp 0.5s ease forwards 0.65s;
    opacity: 0;
  }

  /* next steps */
  .next-title {
    font-size: 13px;
    letter-spacing: 0.15em;
    color: var(--gray);
    text-transform: uppercase;
    margin-bottom: 16px;
    animation: fadeUp 0.5s ease forwards 0.7s;
    opacity: 0;
  }

  .next-steps {
    list-style: none;
    text-align: left;
    display: flex;
    flex-direction: column;
    gap: 10px;
    animation: fadeUp 0.5s ease forwards 0.75s;
    opacity: 0;
  }
  .next-steps li {
    display: flex;
    gap: 12px;
    font-size: 14px;
    color: #aaa;
    align-items: flex-start;
  }
  .step-num {
    flex-shrink: 0;
    width: 22px;
    height: 22px;
    background: #2a2a2a;
    border: 1px solid #333;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: var(--yellow);
    margin-top: 1px;
  }

  /* course CTA */
  .course-box {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-top: 3px solid var(--red);
    padding: 20px;
    margin-top: 20px;
    text-align: left;
    animation: fadeUp 0.5s ease forwards 0.85s;
    opacity: 0;
  }
  .course-tag {
    font-size: 11px;
    color: var(--red);
    font-weight: 700;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }
  .course-name {
    font-size: 16px;
    font-weight: 900;
    margin-bottom: 6px;
  }
  .course-desc {
    font-size: 13px;
    color: var(--gray);
    margin-bottom: 14px;
  }
  .course-link {
    display: inline-block;
    font-size: 13px;
    font-weight: 700;
    color: var(--yellow);
    text-decoration: none;
    border-bottom: 1px solid rgba(255,215,0,0.3);
    padding-bottom: 2px;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 480px) {
    .card-inner { padding: 36px 22px 32px; }
    h1 { font-size: 24px; }
  }
</style>
</head>
<body>

<!-- confetti -->
<div class="burst" id="burst"></div>

<div class="card">
  <div class="top-bar"></div>
  <div class="card-inner">

    <div class="check-icon">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>

    <h1>付款成功<br><em>電子書在這裡</em></h1>
    <p class="sub">感謝你的購買，點下方按鈕立即下載</p>

    <div class="book-preview">
      <div class="book-title">IG 合規經營地雷指南</div>
      <div class="book-meta">
        <span>44 頁 PDF</span>
        <span>36 組對照表</span>
        <span>我是金孫 出品</span>
      </div>
    </div>

    <a href="https://drive.google.com/uc?export=download&id=17r-wpRF3AOdv0YZQ9jNcjGcpiDy7XRNj"
       class="dl-btn" target="_blank" rel="noopener">
      立即下載 PDF
    </a>
    <p class="dl-note">點擊後會在新視窗開啟 Google Drive，點右上角下載圖示即可儲存</p>

    <div class="divider"></div>

    <p class="next-title">下載後建議這樣用</p>
    <ul class="next-steps">
      <li>
        <span class="step-num">1</span>
        先看第二章目錄，找到你的行業直接跳過去
      </li>
      <li>
        <span class="step-num">2</span>
        把第 39 頁的免責聲明範本複製起來，貼到你下一則貼文的最後
      </li>
      <li>
        <span class="step-num">3</span>
        把第 40 頁的高風險詞彙截圖存下來，發文前對照一次
      </li>
    </ul>

    <div class="course-box">
      <div class="course-tag">下一步</div>
      <div class="course-name">《素人也能破萬粉》</div>
      <div class="course-desc">學會合規只是第一步——想讓貼文真的有人看、有人買，來這裡</div>
      <a href="https://www.instagram.com/fang.0721" class="course-link" target="_blank">
        私訊 @fang.0721 了解課程 →
      </a>
    </div>

  </div>
</div>

<script>
  // Confetti burst
  const colors = ['#FFD700','#E8002D','#ffffff','#FFD700','#ff6b6b'];
  const burst = document.getElementById('burst');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('span');
    s.style.cssText = `
      left: ${Math.random()*100}%;
      top: ${-10 + Math.random()*30}%;
      background: ${colors[Math.floor(Math.random()*colors.length)]};
      animation-delay: ${Math.random()*0.8}s;
      animation-duration: ${1.8 + Math.random()*1.2}s;
      width: ${5 + Math.random()*8}px;
      height: ${5 + Math.random()*8}px;
    `;
    burst.appendChild(s);
  }
</script>

</body>
</html>
